name: Deploy MkDocs Site

# Trigger on push to main branch
on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages

    steps:
      # 1️⃣ Check out the repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      # 3️⃣ Install MkDocs + Material theme
      - name: Install MkDocs & Material + Plugins
        run: |
          pip install mkdocs==2.0.4 mkdocs-material
          pip install mkdocs-git-revision-date-plugin

      # 4️⃣ Build the MkDocs site
      - name: Build MkDocs site
        run: mkdocs build

      # 5️⃣ Upload the built site to GitHub Pages
      - name: Upload site to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      # 6️⃣ Deploy the site
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
